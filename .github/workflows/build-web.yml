# This starter workflow is for a CMake project running on multiple platforms. There is a different starter workflow if you just want a single platform.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-single-platform.yml
name: CMake for Emscripten web and publish to NPM

on:
  push:
    tags: [ "*" ]
    branches-ignore: [ "main" ]
    paths:
      - 'CMakeLists.txt'
      - '.github/workflows/build-web.yml'
      - 'tests/**'
      - 'rm_lines/**'
  pull_request:
    branches: [ "main", "experimental" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-sys:
    name: Build for Emscripten web
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      EM_VERSION: 5.0.1
      EM_CACHE_FOLDER: 'emsdk-cache'

    steps:
      - uses: actions/checkout@v6

      - name: Setup cache
        id: cache-system-libraries
        uses: actions/cache@v5
        with:
          path: ${{env.EM_CACHE_FOLDER}}
          key: ${{env.EM_VERSION}}-${{ runner.os }}
      - uses: emscripten-core/setup-emsdk@v15
        with:
          version: ${{env.EM_VERSION}}
          actions-cache-folder: ${{env.EM_CACHE_FOLDER}}

      - name: Verify emsdk installation
        run: emcc -v

      - name: Fetch tags for current commit
        run: git fetch --tags --depth=1

      - name: Set reusable strings
        # Turn repeated input strings (such as the build output directory) into step outputs. These step outputs can be used throughout the workflow file.
        id: strings
        shell: bash
        run: |
          echo "build-output-dir=${{ github.workspace }}/build-web" >> "$GITHUB_OUTPUT"

      - name: Set up python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure CMake
        run: >
          emcmake cmake -B ${{ steps.strings.outputs.build-output-dir }} -S ${{ github.workspace }}

      - name: Build
        # Build your program with the given configuration. Note that --config is needed because the default Windows generator is a multi-config generator (Visual Studio generator).
        run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --target rm_lines_wasm


      - name: Gather files into temp dir
        shell: bash
        run: |
          mkdir -p artifact
          mv "${{ steps.strings.outputs.build-output-dir }}/rm_lines_wasm.js" artifact/
          mv "${{ steps.strings.outputs.build-output-dir }}/rm_lines_wasm.wasm" artifact/
          mv "${{ steps.strings.outputs.build-output-dir }}/rm_lines_wasm.wasm.map" artifact/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: web
          path: |
            artifact/rm_lines_wasm.*
          retention-days: 5

      - uses: rickstaa/action-create-tag@v1
        with:
          tag: latest-draft
          force_push_tag: true

  create-draft-release:
    name: Create Draft Release
    needs: build-sys
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts/

      - name: Create Draft Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest-draft
          body: "Ref: ${{ github.ref_name }}."
          name: Lib rMLines Draft Release
          files: artifacts/**/*
          prerelease: true

  publish-to-npm:
    name: >-
      Publish Sys Package to NPM
    if: startsWith(github.ref, 'refs/tags/')  # only publish to NPM on tag pushes
    needs:
      - build-sys
    runs-on: ubuntu-latest
    environment:
      name: npm
    permissions:
      contents: read
      id-token: write  # IMPORTANT: mandatory for trusted publishing

    steps:
      - uses: actions/checkout@v6
      - name: Download all the dists
        uses: actions/download-artifact@v6
        with:
          path: artifacts/

      - name: Assemble sys package
        shell: bash
        run: |
          set -euo pipefail
          
          SYS_DIR="rm_lines_wasm_sys"
          
          # ensure clean state
          mkdir -p "$SYS_DIR"
          
          # copy wasm artifacts safely
          find artifacts -type f \( \
            -name "rm_lines_wasm.js" -o \
            -name "rm_lines_wasm.wasm" -o \
            -name "rm_lines_wasm.wasm.map" \
          \) -exec cp {} "$SYS_DIR/" \;
          
          ls -R "$SYS_DIR"

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"   # v1.3.5 -> 1.3.5
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Sync package.json version
        shell: bash
        run: |
          cd rm_lines_wasm_sys
          npm version "${{ steps.version.outputs.VERSION }}" --no-git-tag-version

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          package-manager-cache: false

      - name: Publish to npm (trusted publishing)
        working-directory: rm_lines_wasm_sys
        run: |
          set -euo pipefail
          npm pkg get name
          npm pkg get version
          npm publish --provenance --access public