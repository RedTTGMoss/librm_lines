# This starter workflow is for a CMake project running on multiple platforms. There is a different starter workflow if you just want a single platform.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-single-platform.yml
name: CMake on multiple platforms and publish to PYPI

on:
  push:
    tags: [ "*" ]
    branches-ignore: [ "main" ]
    paths:
      - 'CMakeLists.txt'
      - '.github/workflows/build.yml'
      - 'tests/**'
      - 'rm_lines/**'
      - 'rm_lines_sys/**'
  pull_request:
    branches: [ "main", "experimental" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-sys:
    name: ${{ matrix.os }} ${{ matrix.target }}
    runs-on: ${{ matrix.os }}-latest
    
    strategy:
      fail-fast: true
      matrix:
        os: [ 'ubuntu', 'windows', 'macos' ]
        include:
          - os: 'ubuntu'
            target: 'x86_64-unknown-linux-gnu'
            cpp_compiler: 'g++'
            c_compiler: 'gcc'
            build_type: 'Release'
          - os: 'windows'
            target: 'x86_64-pc-windows-gnu'
            cpp_compiler: 'x86_64-w64-mingw32-g++'
            c_compiler: 'x86_64-w64-mingw32-gcc'
            build_type: 'Release'
          - os: 'macos'
            target: 'x86_64-apple-darwin'
            cpp_compiler: 'clang++'
            c_compiler: 'clang'
            build_type: 'Release'
    steps:
      - uses: actions/checkout@v4

      - name: Fetch tags for current commit
        run: git fetch --tags --depth=1

      - name: Set reusable strings
        # Turn repeated input strings (such as the build output directory) into step outputs. These step outputs can be used throughout the workflow file.
        id: strings
        shell: bash
        run: |
          echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

      - name: Cache CMake build files
        uses: actions/cache@v3
        with:
          path: ${{ steps.strings.outputs.build-output-dir }}
          key: ${{ runner.os }}-cmake-${{ matrix.cpp_compiler }}-${{ matrix.c_compiler }}-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-cmake-${{ matrix.cpp_compiler }}-${{ matrix.c_compiler }}-

      - name: Configure CMake
        run: >
          cmake -B ${{ steps.strings.outputs.build-output-dir }}
          -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -S ${{ github.workspace }}

      - name: Build shared library
        run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }} --target rm_lines

      - name: Build static library
        run: >
          cmake -B ${{ steps.strings.outputs.build-output-dir }}-static
          -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DBUILD_SHARED_LIBS=OFF
          -S ${{ github.workspace }}
          &&
          cmake --build ${{ steps.strings.outputs.build-output-dir }}-static --config ${{ matrix.build_type }} --target rm_lines

      - name: Set up python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry colorama Pillow

      - name: Update version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == "refs/tags/"* ]]; then
            # Check if there is a tag on the current commit
            tag=$(git tag --points-at HEAD | head -n 1)
            if [[ -n "$tag" ]]; then
              echo "Tag found: $tag"
              version="${tag}"
            else
              echo "Failed to get tag, using dev"
              version="0.0.0.dev"
            fi
          else
            echo "Not on tagged commit, using dev"
            version="0.0.0.dev"
          fi
          echo "Version: $version"
          echo "version=${version}" >> "$GITHUB_ENV"
          sed -i -e "s|0.0.0+replaced-by-ci|${version}|g" rm_lines_sys/pyproject.toml

      - name: Run test & copy shared library to sys
        shell: bash
        run: |
          cd tests
          python test.py

      - name: Build with poetry
        shell: bash
        run: |
          cd rm_lines_sys
          poetry build -f wheel

      - name: Gather files into temp dir
        shell: bash
        run: |
          mkdir -p artifact/lib artifact/include
          mv rm_lines_sys/dist/*.whl artifact/

          cp -r rm_lines/headers artifact/include/

          case "${{ matrix.os }}" in
            ubuntu*)
              mv "${{ steps.strings.outputs.build-output-dir }}/librm_lines.so" artifact/lib/
              mv "${{ steps.strings.outputs.build-output-dir }}-static/librm_lines.a" artifact/lib/
              ;;
            macos*)
              mv "${{ steps.strings.outputs.build-output-dir }}/librm_lines.dylib" artifact/lib/
              mv "${{ steps.strings.outputs.build-output-dir }}-static/librm_lines.a" artifact/lib/
              ;;
            windows*)
              mv "${{ steps.strings.outputs.build-output-dir }}/${{ matrix.build_type }}/rm_lines.dll" artifact/lib/
              mv "${{ steps.strings.outputs.build-output-dir }}-static/${{ matrix.build_type }}/rm_lines.lib" artifact/lib/
              ;;
          esac

          cd artifact
          tar czf ../librm_lines-${{ matrix.os }}-${{ matrix.target }}.tar.gz lib/ include/
          cd ..
          mv librm_lines-${{ matrix.os }}-${{ matrix.target }}.tar.gz artifact/

      - name: Rename wheel to be Python-agnostic
        shell: bash
        run: |
          file=$(ls artifact/*.whl)
          new_name=$(python -c "import sys, re; print(re.sub(r'cp3\d+-cp3\d+', 'py3-none', sys.argv[1]))" "$file")
          mv "$file" "$new_name"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-${{ matrix.target }}
          path: |
            artifact/*.whl
            artifact/*.tar.gz
            artifact/lib/librm_lines.so
            artifact/lib/librm_lines.dylib
            artifact/lib/rm_lines.dll
            artifact/lib/librm_lines.a
            artifact/lib/rm_lines.lib
          retention-days: 5

  create-draft-release:
    name: Create Draft Release
    needs: build-sys
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create Draft Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Lib rMLines Release ${{ github.ref_name }}
          draft: true
          files: artifacts/**/*

